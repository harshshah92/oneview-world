name: oneview_world
description: OneView - Building Mobile Apps, Games & Digital Solutions
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.1
  font_awesome_flutter: ^10.8.0
  visibility_detector: ^0.4.0+2
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/projects/
